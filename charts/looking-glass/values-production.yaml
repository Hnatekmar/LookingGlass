# Production values for Looking Glass Helm chart
# Copy this file and customize for your environment

# Replica count for high availability
replicaCount: 3

# Docker image configuration
image:
  repository: looking-glass
  pullPolicy: IfNotPresent
  # Override the image tag (defaults to Chart.appVersion)
  tag: ""

# Image pull secrets (if using private registry)
imagePullSecrets: []

# Application naming
nameOverride: ""
fullnameOverride: ""

# Namespace configuration
namespace:
  create: false
  name: ""

# ServiceAccount configuration
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Pod security context (non-root user)
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Resource configuration
# Adjust based on your actual usage and model requirements
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Pod labels and annotations
podLabels: {}
podAnnotations: {}

# Node scheduling
nodeSelector: {}
tolerations: []
affinity: {}

# Configuration values (non-sensitive)
config:
  canvasWidth: "1000"
  canvasHeight: "1000"
  defaultTranslateLanguage: "english"
  port: "8000"

# Sensitive values - REPLACE WITH YOUR ACTUAL VALUES
# For production, consider using External Secrets Operator
secrets:
  imageModel: "qwen3-8b-instruct"
  translationModel: "nemotron-3-nano"
  imageModelUrl: "https://your-image-model-url.com/v1"
  translationModelUrl: "https://your-translation-model-url.com/v1"

# Health probes
livenessProbe:
  enabled: true
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

readinessProbe:
  enabled: true
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3
  successThreshold: 1

# Service configuration
service:
  type: ClusterIP
  port: 8000
  targetPort: 8000
  annotations: {}

# Ingress configuration
ingress:
  enabled: true
  className: "nginx"
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: looking-glass.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: looking-glass-tls
      hosts:
        - looking-glass.example.com

# PodDisruptionBudget for high availability
pdb:
  enabled: true
  minAvailable: 1

# Extra environment variables (if needed)
extraEnv: []
  # - name: EXAMPLE_VAR
  #   value: "example-value"

# Extra volumes and mounts (if needed)
extraVolumes: []
extraVolumeMounts: []

# Extra containers (sidecars)
extraContainers: []

# Init containers
initContainers: []
