# Default values for looking-glass
# This is a YAML-formatted file.

# -- Replica count for the deployment
replicaCount: 1

# -- Docker image configuration
image:
  repository: looking-glass
  pullPolicy: IfNotPresent
  # -- Overrides the image tag (defaults to chart appVersion)
  tag: ""

# -- Image pull secrets (optional)
imagePullSecrets: []

# -- Application name override
nameOverride: ""
fullnameOverride: ""

# -- Namespace configuration
namespace:
  # -- Create namespace if true
  create: false
  # -- Namespace name (defaults to release namespace)
  name: ""

# -- ServiceAccount configuration
serviceAccount:
  # -- Create ServiceAccount
  create: true
  # -- Annotations to add to the ServiceAccount
  annotations: {}
  # -- The name of the ServiceAccount to use
  name: ""

# -- Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

# -- Container security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# -- Resource requests and limits
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# -- Pod labels
podLabels: {}

# -- Pod annotations
podAnnotations: {}

# -- Node selector
nodeSelector: {}

# -- Tolerations
tolerations: []

# -- Affinity rules
affinity: {}

# -- Configuration for non-sensitive environment variables
config:
  # -- Canvas width for image processing
  canvasWidth: "1000"
  # -- Canvas height for image processing
  canvasHeight: "1000"
  # -- Default translation target language
  defaultTranslateLanguage: "english"
  # -- Server port
  port: "8000"

# -- Configuration for sensitive environment variables (will be stored in Secrets)
# -- IMPORTANT: Replace these with actual values or use external secret management
secrets:
  # -- Image model name (e.g., qwen3-8b-instruct)
  imageModel: ""
  # -- Translation model name (e.g., nemotron-3-nano)
  translationModel: ""
  # -- Image model API endpoint
  imageModelUrl: ""
  # -- Translation model API endpoint
  translationModelUrl: ""
  # -- OAuth2 Client ID
  oauth2ClientId: ""
  # -- OAuth2 Client Secret
  oauth2ClientSecret: ""
  # -- OAuth2 Redirect URI (must match provider configuration)
  oauth2RedirectUri: ""
  # -- OAuth2 Issuer URL (for OIDC discovery)
  oauth2Issuer: ""
  # -- OAuth2 Scopes (space-separated)
  oauth2Scopes: "openid profile email"
  # -- Session secret key for cookie-based session management (REQUIRED for OAuth2)
  # Generate with: python -c "import secrets; print(secrets.token_urlsafe(32))"
  sessionSecretKey: ""
  # -- Optional: Manual OAuth2 endpoints (if OIDC discovery not available)
  oauth2AuthorizeUrl: ""
  oauth2TokenUrl: ""
  oauth2JwksUrl: ""
  # -- Redis URL for persistent access code storage (recommended for production)
  # Format: redis://host:port/db or use secret reference
  # Example: redis://redis-master:6379/0
  redisUrl: ""
  # -- Redis password (optional, use with redisUrl containing username)
  redisPassword: ""
  # -- Access code TTL in seconds (default: 86400 = 24 hours)
  accessCodeTtl: "86400"
# -- Liveness probe configuration
livenessProbe:
  enabled: true
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

# -- Readiness probe configuration
readinessProbe:
  enabled: true
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3
  successThreshold: 1

# -- Service configuration
service:
  type: ClusterIP
  port: 8000
  targetPort: 8000
  # -- Additional service annotations
  annotations: {}

# -- Ingress configuration
ingress:
  # -- Enable ingress resource
  enabled: false
  # -- Ingress class name
  className: ""
  # -- Additional ingress annotations
  annotations: {}
  # -- Ingress host configuration
  hosts:
    - host: looking-glass.local
      paths:
        - path: /
          pathType: Prefix
  # -- TLS configuration
  tls: []
  #  - secretName: looking-glass-tls
  #    hosts:
  #      - looking-glass.local

# -- PodDisruptionBudget configuration
pdb:
  # -- Enable PodDisruptionBudget
  enabled: false
  # -- Minimum available pods (either minAvailable or maxUnavailable)
  minAvailable: 1
  # maxUnavailable: 0

# -- Extra environment variables (as key-value pairs)
extraEnv: {}

# -- Extra volumes (for mounting additional files/configs)
extraVolumes: []

# -- Extra volume mounts
extraVolumeMounts: []

# -- Extra containers (sidecars)
extraContainers: []

# -- Extra init containers
initContainers: []
