# ArgoCD Application for Looking Glass
# Apply this file to deploy Looking Glass via ArgoCD
#
# Usage:
#   kubectl apply -f argocd-application.yaml
#
# Prerequisites:
#   - ArgoCD installed in your cluster
#   - Access to the Git repository containing this chart

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: looking-glass
  namespace: argocd  # Change to your ArgoCD namespace
  # Optional: Add finalizers for cascading deletion
  # finalizers:
  #   - resources-finalizer.argocd.argoproj.io
spec:
  # Project the application belongs to
  project: default

  # Source of the application manifests
  source:
    # Git repository URL (change to your repository)
    repoURL: https://github.com/your-org/looking-glass.git
    
    # Target revision (branch, tag, or commit)
    targetRevision: HEAD
    
    # Path to the Helm chart in the repository
    path: charts/looking-glass
    
    # Helm-specific configuration
    helm:
      # Release name (defaults to application name)
      releaseName: looking-glass
      
      # Pass values directly (alternative to using valueFiles)
      # IMPORTANT: For production, use external secrets or separate values file
      values: |
        replicaCount: 1
        
        image:
          repository: looking-glass
          pullPolicy: IfNotPresent
          tag: ""
        
        # Configuration values (non-sensitive)
        config:
          canvasWidth: "1000"
          canvasHeight: "1000"
          defaultTranslateLanguage: "english"
          port: "8000"
        
        # Sensitive values - REPLACE WITH YOUR ACTUAL VALUES
        # For production, use External Secrets Operator or similar
        secrets:
          imageModel: "qwen3-8b-instruct"
          translationModel: "nemotron-3-nano"
          imageModelUrl: "https://your-image-model-url.com/v1"
          translationModelUrl: "https://your-translation-model-url.com/v1"
        
        # Resource configuration
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
        
        # Service configuration
        service:
          type: ClusterIP
          port: 8000
          targetPort: 8000
        
        # Ingress configuration (disable if not needed)
        ingress:
          enabled: false
          className: ""
          annotations: {}
          hosts:
            - host: looking-glass.local
              paths:
                - path: /
                  pathType: Prefix
          tls: []
        
        # PodDisruptionBudget (enable for production)
        pdb:
          enabled: false
          minAvailable: 1
        
        # Security context
        podSecurityContext:
          runAsNonRoot: true
          runAsUser: 1000
          fsGroup: 1000
        
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL

  # Destination cluster and namespace
  destination:
    # Kubernetes API server URL
    server: https://kubernetes.default.svc
    
    # Target namespace (will be created if CreateNamespace=true)
    namespace: looking-glass

  # Sync policy
  syncPolicy:
    # Automated sync options
    automated:
      # Prune resources that are no longer in the manifest
      prune: true
      
      # Automatically sync when the source changes
      selfHeal: true
      
      # Allow pruning of resources without replacing them
      allowEmpty: false
    
    # Sync options
    syncOptions:
      # Create namespace if it doesn't exist
      - CreateNamespace=true
      
      # Server-side apply (recommended for large deployments)
      - ServerSideApply=true
      
      # Fail the sync if there are resources in the way
      - PrunePropagationPolicy=foreground
      
      # Prune last (delete resources after sync)
      - PruneLast=true
    
    # Retry configuration (optional)
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  # Health assessment (optional)
  # ignoreDifferences:
  #   - group: apps
  #     kind: Deployment
  #     jsonPointers:
  #       - /spec/replicas

  # Revision history limit
  revisionHistoryLimit: 10
