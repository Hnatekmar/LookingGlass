services:
  # Main LookingGlass application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lookingglass-app
    env_file:
      - .env
    ports:
      - "8090:8090"
    depends_on:
      image-annotator:
        condition: service_healthy
    environment:
      - IMAGE_MODEL_URL=http://image-annotator:8000/v1
    networks:
      - lookingglass-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Image annotation service using vLLM with GLM-OCR
  image-annotator:
    image: vllm/vllm-openai:nightly
    container_name: lookingglass-image-annotator
    volumes:
      - huggingface:/root/.cache/huggingface
    command: >
      zai-org/GLM-OCR
      --max-model-len 16192
      --gpu-memory-util 0.8
    runtime: nvidia
    restart: unless-stopped
    networks:
      - lookingglass-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  huggingface:
    name: huggingface-cache

networks:
  lookingglass-network:
    driver: bridge
