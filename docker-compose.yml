services:
  # Main LookingGlass application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lookingglass-app
    ports:
      - "8090:8090"
    depends_on:
      image-annotator:
        condition: service_healthy
    environment:
      # Required: model and endpoint configuration
      - IMAGE_MODEL=${IMAGE_MODEL:-zai-org/GLM-OCR}
      - TRANSLATION_MODEL=${TRANSLATION_MODEL:-nemotron-3-nano}
      - IMAGE_MODEL_URL=http://image-annotator:8000/v1
      - TRANSLATION_MODEL_URL=${TRANSLATION_MODEL_URL:-http://host.docker.internal:8000/v1}
      # Server port (inside container)
      - PORT=8090
      # Canvas defaults
      - CANVAS_WIDTH=${CANVAS_WIDTH:-1000}
      - CANVAS_HEIGHT=${CANVAS_HEIGHT:-1000}
      # Default translation language
      - DEFAULT_TRANSLATE_LANGUAGE=${DEFAULT_TRANSLATE_LANGUAGE:-english}
      # GLM-OCR configuration
      - ENABLE_GLM_OCR=${ENABLE_GLM_OCR:-false}
      - GLM_OCR_TIMEOUT=${GLM_OCR_TIMEOUT:-60}
      - GLM_OCR_MAX_TOKENS=${GLM_OCR_MAX_TOKENS:-4096}
      # Gemma 12b OCR configuration (optional, defaults to remote endpoint)
      - ENABLE_GEMMA_OCR=${ENABLE_GEMMA_OCR:-false}
      - GEMMA_OCR_URL=${GEMMA_OCR_URL:-http://172.16.100.189:8010/v1}
      - GEMMA_OCR_MODEL=${GEMMA_OCR_MODEL:-gemma-12b}
      - GEMMA_OCR_TIMEOUT=${GEMMA_OCR_TIMEOUT:-120}
      - GEMMA_OCR_MAX_TOKENS=${GEMMA_OCR_MAX_TOKENS:-4096}
      # Redis (optional)
      - REDIS_URL=${REDIS_URL:-}
    networks:
      - lookingglass-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Image annotation service using vLLM with GLM-OCR
  image-annotator:
    image: vllm/vllm-openai:nightly
    container_name: lookingglass-image-annotator
    volumes:
      - huggingface:/root/.cache/huggingface
    command: >
      zai-org/GLM-OCR
      --max-model-len 16192
      --gpu-memory-util 0.8
    runtime: nvidia
    restart: unless-stopped
    networks:
      - lookingglass-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  huggingface:
    name: huggingface-cache

networks:
  lookingglass-network:
    driver: bridge
