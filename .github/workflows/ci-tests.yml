name: CI Tests

on:
  push:
    branches: [main, develop, 'feat/**', 'fix/**']
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'LICENSE'
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install UV
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run pytest
        run: uv run pytest tests/ -v --timeout=30
        env:
          IMAGE_MODEL: "test-model"
          IMAGE_MODEL_URL: "http://localhost:8000/v1"
          TRANSLATION_MODEL: "test-translator"
          TRANSLATION_MODEL_URL: "http://localhost:8001/v1"
          GEMMA_OCR_URL: "http://localhost:8010/v1"
          GEMMA_OCR_MODEL: "gemma-12b-test"
