name: Build Firefox Extension

on:
  push:
    branches:
      - main
    paths:
      - image-annotator-firefox-extension/**
  pull_request:
    paths:
      - image-annotator-firefox-extension/**
  workflow_dispatch:

jobs:
  build:
    name: Build & lint Firefox extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate with web-ext
        uses: mozilla/actions-web-ext@1.1.0
        with:
          source-dir: image-annotator-firefox-extension
          extension-version: ${{ github.sha }}

      - name: Create zip artifact
        run: |
          cd image-annotator-firefox-extension
          zip -r ../image-annotator-firefox.zip . -x "*.git*" -x "README.md"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-annotator-firefox
          path: image-annotator-firefox.zip
          retention-days: 30