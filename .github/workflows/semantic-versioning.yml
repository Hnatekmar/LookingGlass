name: Semantic Versioning

on:
  push:
    branches: [main]

jobs:
  version:
    name: Bump version based on commits
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Determine version bump
        id: bump
        run: |
          # Check commit messages since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Last tag: $LAST_TAG"

          # Determine bump type from conventional commits
          # major: ! or BREAKING CHANGE
          # minor: feat/feature
          # patch: fix/docs/chore/refactor (default)
          BUMP="patch"
          MERGE_COMMITS=$(git log "$LAST_TAG"..HEAD --format="%B" 2>/dev/null || git log --format="%B")

          if echo "$MERGE_COMMITS" | grep -qiE "breaking\s*change|!:"; then
            BUMP="major"
          elif echo "$MERGE_COMMITS" | grep -qiE "^feat(\(.*\))?:"; then
            BUMP="minor"
          fi

          echo "Bump type: $BUMP"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"

      - name: Calculate new version
        id: version
        run: |
          # Extract numeric version from last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          VERSION="${LAST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          BUMP="${{ steps.bump.outputs.bump }}"
          if [ "$BUMP" = "major" ]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [ "$BUMP" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"

          # Ensure the computed tag doesn't already exist (local or remote)
          # by incrementing patch until we find a free version
          while true; do
            TAG_EXISTS=false
            git rev-parse "v$NEW_VERSION" >/dev/null 2>&1 && TAG_EXISTS=true
            git ls-remote --exit-code origin "refs/tags/v$NEW_VERSION" >/dev/null 2>&1 && TAG_EXISTS=true
            [ "$TAG_EXISTS" = "false" ] && break
            PATCH=$((PATCH + 1))
            NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          done

          echo "New version: v$NEW_VERSION"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Update pyproject.toml version
        run: |
          NEW_VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/^version = \".*\"/version = \"$NEW_VERSION\"/" pyproject.toml
          git config user.name "zelvinator"
          git config user.email "zelvinator@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore: bump version to v$NEW_VERSION"

      - name: Create and push tag
        run: |
          NEW_VERSION="${{ steps.version.outputs.version }}"
          echo "Creating tag: v$NEW_VERSION"
          git tag -a "v$NEW_VERSION" -m "Release v$NEW_VERSION"
          git push origin "v$NEW_VERSION"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
