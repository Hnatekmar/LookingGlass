services:
  nginx-reverse-proxy:
    image: nginx:alpine
    container_name: image-annotator-proxy
    ports:
      - "9090:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - proxy-network

networks:
  proxy-network:
    driver: bridge
